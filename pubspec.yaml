name: flutter_arduino_playground
description: "FLutter app to design and simulate Arduino circuit"
publish_to: 'none'
version: 0.0.1+1

environment:
  sdk: ^3.12.2

dependencies:
  flutter:
    sdk: flutter

  super_drag_and_drop: ^0.9.1
  google_fonts: ^6.3.3
  flutter_svg: ^2.2.3
  collection: ^1.19.1
  vector_math: ^2.2.0

dev_dependencies:
  flutter_test:
    sdk: flutter
    
  flutter_lints: ^6.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/
